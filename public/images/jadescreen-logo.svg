<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="50%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="92" fill="#0f172a" stroke="url(#emeraldGrad)" stroke-width="3" />
  <!-- Stylized film frame -->
  <rect x="44" y="52" width="112" height="96" rx="12" fill="url(#emeraldGrad)" opacity="0.15" />
  <rect x="48" y="56" width="104" height="88" rx="8" fill="none" stroke="url(#emeraldGrad)" stroke-width="2.5" />
  <!-- Play triangle -->
  <polygon points="82,72 82,128 128,100" fill="url(#emeraldGrad)" />
  <!-- Sprocket holes (film reel dots) -->
  <circle cx="62" cy="65" r="2.5" fill="#10b981" opacity="0.6" />
  <circle cx="62" cy="80" r="2.5" fill="#10b981" opacity="0.6" />
  <circle cx="62" cy="95" r="2.5" fill="#10b981" opacity="0.6" />
  <circle cx="62" cy="110" r="2.5" fill="#10b981" opacity="0.6" />
  <circle cx="62" cy="125" r="2.5" fill="#10b981" opacity="0.6" />
  <circle cx="138" cy="65" r="2.5" fill="#10b981" opacity="0.6" />
  <circle cx="138" cy="80" r="2.5" fill="#10b981" opacity="0.6" />
  <circle cx="138" cy="95" r="2.5" fill="#10b981" opacity="0.6" />
  <circle cx="138" cy="110" r="2.5" fill="#10b981" opacity="0.6" />
  <circle cx="138" cy="125" r="2.5" fill="#10b981" opacity="0.6" />
</svg>